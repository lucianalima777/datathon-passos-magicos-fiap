services:
  - type: web
    name: passos-magicos-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8000"
      - key: DEEPSEEK_API_KEY
        sync: false 
    healthCheckPath: /health

  - type: web
    name: passos-magicos-frontend
    runtime: python
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        fromService:
          name: passos-magicos-api
          type: web
          property: hostport
      - key: DEEPSEEK_API_KEY
        sync: false  
